<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4939c9">
<title>Upload reports · NANDI Med</title>
<style>
  :root{--accent:#4939c9;--accent-2:#6a5cf0;--ink:#23243a;--mut:#6c6f8c;--rule:#e2e3ef;--paper:#fdfdff;--paper-2:#f5f5fb;--green:#1f9e73;--red:#cc3b45}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;padding:0 16px calc(30px + env(safe-area-inset-bottom))}
  .wrap{max-width:480px;margin:0 auto;padding-top:calc(28px + env(safe-area-inset-top))}
  .mark{width:60px;height:60px;border-radius:18px;background:linear-gradient(150deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;margin:0 auto 16px;box-shadow:0 12px 30px rgba(73,57,201,.4)}
  .mark svg{width:34px;height:34px}
  h1{font-size:1.35rem;text-align:center;margin:0 0 4px;letter-spacing:-.02em}
  .sub{text-align:center;font-size:.6rem;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:var(--mut);margin-bottom:18px}
  .card{background:#fff;border:1px solid var(--rule);border-radius:16px;padding:20px;box-shadow:0 6px 28px rgba(30,28,70,.08)}
  .greet{font-size:1.02rem;font-weight:700;margin-bottom:2px}
  .note{font-size:.86rem;color:var(--mut);line-height:1.5}
  .drop{margin-top:16px;border:1.5px dashed #c5c6df;border-radius:14px;padding:26px 16px;text-align:center;background:var(--paper-2);cursor:pointer;transition:border-color .15s,background .15s}
  .drop:hover{border-color:var(--accent);background:#f0eefc}
  .drop svg{width:34px;height:34px;color:var(--accent);margin-bottom:8px}
  .drop b{display:block;font-size:.95rem}
  .drop span{font-size:.78rem;color:var(--mut)}
  input[type=file]{display:none}
  .thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px}
  .thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--rule);background:var(--paper-2)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .fname{position:absolute;inset:auto 0 0 0;background:rgba(35,36,58,.8);color:#fff;font-size:.6rem;padding:3px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .thumb .rm{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(35,36,58,.85);color:#fff;border:none;display:grid;place-items:center;cursor:pointer;font-size:14px;line-height:1}
  .thumb.doc{display:grid;place-items:center;color:var(--mut);font-size:.7rem;text-align:center;padding:8px}
  .btn{width:100%;margin-top:18px;padding:16px;border:none;border-radius:13px;background:var(--accent);color:#fff;font-family:inherit;font-size:1.02rem;font-weight:700;cursor:pointer;min-height:56px;transition:background .15s}
  .btn:hover{background:#3a2ca8}
  .btn:disabled{opacity:.5;cursor:default}
  .msg{margin-top:14px;font-size:.88rem;text-align:center;padding:12px;border-radius:11px;display:none}
  .msg.ok{display:block;background:#e0f4ec;color:var(--green)}
  .msg.err{display:block;background:#fbe6e7;color:var(--red)}
  .foot{text-align:center;font-size:.72rem;color:var(--mut);margin-top:20px}
  .done{text-align:center;padding:20px 0}
  .done .big{width:64px;height:64px;border-radius:20px;background:var(--green);color:#fff;display:grid;place-items:center;margin:0 auto 14px}
  .done .big svg{width:34px;height:34px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3v6a5 5 0 0 0 10 0V3"/><path d="M4 3H2.5m1.5 0h1.5M14 3h-1.5m1.5 0h1.5"/><path d="M9 14v2a6 6 0 0 0 12 0v-2"/><circle cx="21" cy="10" r="1.8"/></svg></div>
  <h1>Upload your reports</h1>
  <div class="sub">NANDI Med · by Flux</div>
  <div id="main" class="card">
    <div id="loading" class="note" style="text-align:center">Checking your link…</div>
  </div>
  <div class="foot">Your files go directly to your clinic. This page cannot show your medical records.</div>
</div>

<script>
'use strict';
// ── EDIT THIS: paste your deployed Apps Script /exec URL ─────────
var BACKEND_URL = 'PASTE_YOUR_EXEC_URL_HERE';

var P = new URLSearchParams(location.search);
var C = P.get('c'), V = P.get('v'), T = P.get('t');
var picked = []; // {name, mime, dataUrl, b64}

var main = document.getElementById('main');
var ICON_UP = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3"/></svg>';
var ICON_OK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 10 17l9-10"/></svg>';

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

if(!C||!V||!T){ main.innerHTML='<div class="note" style="text-align:center;color:var(--red)">This link is incomplete. Please use the exact link your clinic sent you.</div>'; }
else if(BACKEND_URL.indexOf('PASTE')>-1){ main.innerHTML='<div class="note" style="text-align:center;color:var(--red)">This page is not configured yet.</div>'; }
else { init(); }

function init(){
  fetch(BACKEND_URL+(BACKEND_URL.indexOf('?')>-1?'&':'?')+'action=uploadinfo&c='+encodeURIComponent(C)+'&v='+encodeURIComponent(V)+'&t='+encodeURIComponent(T))
    .then(function(r){return r.json();})
    .then(function(r){ if(r&&r.ok) renderPicker(r); else fail(); })
    .catch(fail);
}
function fail(){ main.innerHTML='<div class="note" style="text-align:center;color:var(--red)">This upload link is invalid or has expired. Please contact your clinic.</div>'; }

function renderPicker(info){
  main.innerHTML =
    '<div class="greet">Namaste'+(info.patientFirst?', '+esc(info.patientFirst):'')+'</div>'
    +'<div class="note">Add photos of your reports, prescriptions, or anything '+esc(info.clinic||'your clinic')+' asked for.</div>'
    +'<div class="drop" id="drop">'+ICON_UP+'<b>Tap to add files</b><span>Photos or PDF · up to 8</span></div>'
    +'<input type="file" id="file" accept="image/*,application/pdf" multiple capture="environment">'
    +'<div class="thumbs" id="thumbs"></div>'
    +'<button class="btn" id="send" disabled>Select files first</button>'
    +'<div class="msg" id="msg"></div>';
  document.getElementById('drop').onclick=function(){document.getElementById('file').click();};
  document.getElementById('file').onchange=onFiles;
  document.getElementById('send').onclick=send;
}

function onFiles(e){
  var files = Array.from(e.target.files||[]);
  files.forEach(function(f){
    if(picked.length>=8) return;
    if(f.type.indexOf('image/')===0){
      downscale(f, function(dataUrl){
        picked.push({name:f.name, mime:'image/jpeg', dataUrl:dataUrl, b64:dataUrl.split(',')[1]});
        drawThumbs();
      });
    }else{
      var rd=new FileReader();
      rd.onload=function(){ picked.push({name:f.name, mime:f.type||'application/octet-stream', dataUrl:null, b64:rd.result.split(',')[1]}); drawThumbs(); };
      rd.readAsDataURL(f);
    }
  });
  e.target.value='';
}
function downscale(file, cb){
  var img=new Image(), rd=new FileReader();
  rd.onload=function(){ img.onload=function(){
    var max=1400, w=img.width, h=img.height;
    if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
    var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    cb(cv.toDataURL('image/jpeg',0.82));
  }; img.src=rd.result; };
  rd.readAsDataURL(file);
}
function drawThumbs(){
  var t=document.getElementById('thumbs'); t.innerHTML='';
  picked.forEach(function(p,i){
    var el=document.createElement('div'); el.className='thumb'+(p.dataUrl?'':' doc');
    el.innerHTML=(p.dataUrl?'<img src="'+p.dataUrl+'">':'<span>'+esc(p.name)+'</span>')
      +'<button class="rm" onclick="rm('+i+')">&times;</button>'
      +(p.dataUrl?'<div class="fname">'+esc(p.name)+'</div>':'');
    t.appendChild(el);
  });
  var b=document.getElementById('send');
  b.disabled=picked.length===0;
  b.textContent=picked.length?('Send '+picked.length+' file'+(picked.length===1?'':'s')):'Select files first';
}
window.rm=function(i){ picked.splice(i,1); drawThumbs(); };

function send(){
  var b=document.getElementById('send'), msg=document.getElementById('msg');
  b.disabled=true; b.innerHTML='<span class="spin"></span>Sending…'; msg.className='msg';
  fetch(BACKEND_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'upload',clinicId:C,visitId:V,token:T,
      files:picked.map(function(p){return {name:p.name,mime:p.mime,data:p.b64};})})})
  .then(function(r){return r.json();})
  .then(function(r){
    if(r&&r.ok){
      main.innerHTML='<div class="done"><div class="big">'+ICON_OK+'</div><div class="greet">Files received</div><div class="note">Your clinic has your '+r.saved+' file'+(r.saved===1?'':'s')+'. You can close this page.</div></div>';
    }else{ b.disabled=false; b.textContent='Try again'; msg.className='msg err'; msg.textContent=(r&&r.error)||'Upload failed. Please try again.'; }
  })
  .catch(function(){ b.disabled=false; b.textContent='Try again'; msg.className='msg err'; msg.textContent='No connection. Check your internet and try again.'; });
}
</script>
</body>
</html>
